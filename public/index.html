<!-- /public/index.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Mania Next - Single Player</title>
    <!-- 将 ffmpeg.wasm 移至主页面以便预处理转码 -->
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="mode-switcher">
        <a class="mode-tab active" href="index.html">Single Player</a>
        <a class="mode-tab" href="multiplayer.html">Multiplayer</a>
    </div>

    <!-- 移除了默认的 active 状态，由 js 决策 -->
    <div id="setup-screen" class="screen">
        <div class="setup-box">
            <div class="setup-title" data-i18n="init_title">初始化</div>
            <div class="setup-desc" data-i18n="init_desc">请选择您的 <b>osu! Songs</b> 文件夹</div>
            <div id="path-display" style="margin-bottom: 20px; color: #60a5fa; font-size: 13px; word-break: break-all;">[ 路径为空 ]</div>
            <button id="select-folder-btn" class="osu-btn secondary" style="width: 100%; margin-bottom: 15px;" data-i18n="browse">浏览...</button>
            <br>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button id="scan-btn" class="osu-btn" style="width: 100%;" data-i18n="start_game">开始游戏</button>
            </div>
            <div id="scan-status" style="margin-top: 20px; color: #a1a1aa; font-size: 13px;"></div>
            <input type="hidden" id="folder-input">
        </div>
    </div>

    <div id="select-screen" class="screen">
        <div id="select-bg" class="select-bg"></div>
        <div id="settings-btn" class="osu-btn top-btn-pos" style="right: 40px; height: 42px; padding: 0 20px;" data-i18n="settings">设置</div>
        
        <div class="search-bar-container" id="search-bar-container">
            <div style="display: flex; gap: 10px; width: 100%;">
                <input type="text" id="search-input" class="search-input" placeholder="搜索标题、艺术家、难度..." data-i18n="search_placeholder" style="flex: 2;">
                <div id="dropdown-sort-field" class="osu-dropdown-placeholder" style="margin-bottom: 0; flex: 1;"></div>
                <div id="dropdown-sort-dir" class="osu-dropdown-placeholder" style="margin-bottom: 0; flex: 1;"></div>
                <div id="dropdown-filter-keys" class="osu-dropdown-placeholder" style="margin-bottom: 0; flex: 1;"></div>
            </div>
            <div id="slider-diff-range" class="osu-slider-placeholder" style="margin-bottom: 0;"></div>
        </div>

        <div class="select-left">
            <div class="map-stats" id="map-stats">
                <div class="stat-item">BPM <span id="stat-bpm">0</span></div>
                <div class="stat-item">OD <span id="stat-od">0</span></div>
                <div class="stat-item">HP <span id="stat-hp">0</span></div>
                <div class="stat-item">Notes <span id="stat-notes">0</span></div>
                <div class="stat-item">Holds <span id="stat-holds">0</span></div>
                <div class="stat-item">Keys <span id="stat-keys" style="color:#fbbf24;">4K</span></div>
            </div>

            <div class="info-container">
                <div style="color: #60a5fa; font-size: 14px; font-weight: 600; margin-bottom: 5px;" id="info-header" data-i18n="select_song_start">选择一首歌曲开始</div>
                <div id="info-title" class="info-title">等待中...</div>
                <div id="info-artist" class="info-artist">...</div>
                <div id="info-version" style="font-size: 20px; color: #fff; font-weight: 700; margin-bottom: 10px;"></div>
                <div id="info-stars" class="info-stars"></div>
                <div class="loading-indicator" data-i18n="loading_map">正在加载谱面...</div>

                <div style="display: flex; gap: 20px; width: 100%; max-width: 650px; margin-top: 15px;">
                    <div id="local-leaderboard-panel" style="flex: 1; background: transparent; border: none; padding: 0; display: none; flex-direction: column; min-height: 0;">
                        <div class="leaderboard-title" data-i18n="local_scores">本地分数</div>
                        <div id="local-leaderboard-list" style="flex: 1; overflow-y: auto; font-size: 14px; padding-right: 15px; max-height: 180px;">等待中...</div>
                    </div>
                    <div id="leaderboard-panel" style="flex: 1; background: transparent; border: none; padding: 0; display: none; flex-direction: column; min-height: 0;">
                        <div class="leaderboard-title" data-i18n="global_scores">全球排行榜</div>
                        <div id="leaderboard-list" style="flex: 1; overflow-y: auto; font-size: 14px; padding-right: 15px; max-height: 180px;">等待中...</div>
                    </div>
                </div>
            </div>
            
            <button id="btn-random-map" class="osu-btn" style="position: absolute; bottom: 30px; left: 80px; z-index: 100;" data-i18n="random_map">[ 随机选歌 ]</button>
        </div>

        <div class="select-right" id="map-list"></div>
        
        <!-- 移至页面底部的优雅进度条 -->
        <div id="transcode-overlay" style="display: none; position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; background: rgba(255,255,255,0.1); z-index: 200;">
            <div id="transcode-progress" style="width: 0%; height: 100%; background: #3b82f6; transition: width 0.1s linear; box-shadow: 0 0 10px #3b82f6;"></div>
            <div id="transcode-text" style="position: absolute; bottom: 15px; left: 80px; font-size: 14px; font-weight: bold; color: #60a5fa; text-shadow: 0 2px 5px rgba(0,0,0,0.8);">正在转码以提供更流畅的性能... 0%</div>
        </div>
    </div>

    <div id="sidebar-close-zone" onclick="closeSettings()"></div>
    <div id="settings-sidebar">
        <div class="settings-header" data-i18n="settings">设置</div>
        <div class="settings-content">
            <!-- 常规 -->
            <section class="set-sec">
                <h2 data-i18n="cat_general">常规</h2>
                <button class="osu-btn" style="width:100%; margin-bottom: 15px;" onclick="showScreen('setup-screen'); closeSettings();" data-i18n="open_wizard">打开设置向导</button>
                <div id="dropdown-language" class="osu-dropdown-placeholder"></div>
                <button class="osu-btn" style="width:100%; margin-bottom: 15px;" onclick="openSongsFolder()" data-i18n="open_songs">打开songs文件夹</button>
                <div class="set-row">
                    <label data-i18n="change_songs">更改songs文件夹位置</label>
                    <div style="display:flex;gap:10px;">
                        <input type="text" id="st-folder" class="osu-input" style="flex:1;">
                        <button class="osu-btn secondary" style="margin-top:0;" onclick="browseFolder()" data-i18n="browse">浏览</button>
                    </div>
                </div>
                <button class="osu-btn danger" style="width:100%; margin-top: 15px;" onclick="triggerRebuildCache()" data-i18n="rebuild_cache">重新建立谱面缓存</button>
            </section>

            <!-- 皮肤 -->
            <section class="set-sec">
                <h2 data-i18n="cat_skin">皮肤</h2>
                <div id="dropdown-skinKeys" class="osu-dropdown-placeholder"></div>
                <div id="st-skin-colors" style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                </div>
            </section>

            <!-- 输入 -->
            <section class="set-sec">
                <h2 data-i18n="cat_input">输入</h2>
                <button class="osu-btn" style="width:100%; margin-bottom: 15px;" onclick="openKeybinds()" data-i18n="config_keys">配置</button>
                <div id="toggle-highPrecision" class="osu-toggle-placeholder"></div>
                <div id="slider-sensitivity" class="osu-slider-placeholder"></div>
                <div id="dropdown-confineCursor" class="osu-dropdown-placeholder"></div>
                <div id="toggle-disableWheel" class="osu-toggle-placeholder"></div>
                <div id="toggle-disableClick" class="osu-toggle-placeholder"></div>
                <div id="toggle-touchClick" class="osu-toggle-placeholder"></div>
            </section>

            <!-- 界面 -->
            <section class="set-sec">
                <h2 data-i18n="cat_ui">界面</h2>
                <div id="slider-bgBlur" class="osu-slider-placeholder"></div>
                <div id="slider-bgDim" class="osu-slider-placeholder"></div>
                <div id="slider-scrollSpeed" class="osu-slider-placeholder"></div>
                <div id="slider-trackScale" class="osu-slider-placeholder"></div>
                
                <div id="toggle-hitErrorMeter" class="osu-toggle-placeholder"></div>
                <div id="toggle-noStoryboard" class="osu-toggle-placeholder"></div>
            </section>

            <!-- 音频 -->
            <section class="set-sec">
                <h2 data-i18n="cat_audio">音频</h2>
                <div id="dropdown-audioDevice" class="osu-dropdown-placeholder"></div>
                
                <div id="toggle-enableHitSounds" class="osu-toggle-placeholder"></div>

                <div id="slider-masterVol" class="osu-slider-placeholder"></div>
                <div id="slider-bgVol" class="osu-slider-placeholder"></div>
                <div id="slider-sfxVol" class="osu-slider-placeholder"></div>
                <div id="slider-musicVol" class="osu-slider-placeholder"></div>
                
                <button class="osu-btn" style="width:100%; margin-bottom: 15px;" onclick="window.open('offset_calibration.html', 'Web Mania Next Offset Calibration', 'width=800,height=600,autoHideMenuBar=true')" data-i18n="calibrate_offset">主动调整音频延迟</button>
                <div id="slider-offset" class="osu-slider-placeholder"></div>
                
                <button class="osu-btn success" id="btn-use-rec" style="width:100%; margin-bottom: 15px; display:none;" onclick="applyRecommendedOffset()" data-i18n="use_rec">使用推荐延迟</button>
                <div id="toggle-autoOffset" class="osu-toggle-placeholder"></div>
            </section>

            <!-- 图像 -->
            <section class="set-sec">
                <h2 data-i18n="cat_gfx">图像</h2>
                <div id="toggle-autoKiosk" class="osu-toggle-placeholder"></div>
                
                <div id="slider-uiScale" class="osu-slider-placeholder"></div>
                
                <div id="dropdown-renderer" class="osu-dropdown-placeholder"></div>
                <div id="toggle-desync" class="osu-toggle-placeholder"></div>
                <div id="dropdown-fpsLimit" class="osu-dropdown-placeholder"></div>
                <div id="dropdown-threadMode" class="osu-dropdown-placeholder"></div>

                <div id="toggle-showFps" class="osu-toggle-placeholder"></div>
                <div id="toggle-hwAccel" class="osu-toggle-placeholder"></div>
            </section>

            <!-- 在线 -->
            <section class="set-sec" style="margin-bottom: 80px;">
                <h2 data-i18n="cat_online">在线</h2>
                <div class="set-row">
                    <label data-i18n="multi_id">多人游戏ID</label>
                    <input type="text" id="st-multiId" class="osu-input">
                </div>
            </section>

        </div>
    </div>

    <div id="context-menu">
        <div class="cm-item" id="cm-fav">收藏</div>
        <div class="cm-item" id="cm-rename">重命名文件夹</div>
        <div class="cm-item" id="cm-delete" style="color: #fca5a5;">删除谱面</div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
