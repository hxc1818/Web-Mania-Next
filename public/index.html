<!-- /public/index.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Mania Next - Single Player</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="mode-switcher">
        <a class="mode-tab active" href="index.html">Single Player</a>
        <a class="mode-tab" href="multiplayer.html">Multiplayer</a>
    </div>

    <div id="setup-screen" class="screen active">
        <div class="setup-box">
            <div class="setup-title">初始化</div>
            <div class="setup-desc">请选择您的 <b>osu! Songs</b> 文件夹</div>
            <div id="path-display" style="margin-bottom: 20px; color: #60a5fa; font-size: 13px; word-break: break-all;">[ 路径为空 ]</div>
            <button id="select-folder-btn" class="setup-btn" style="background: rgba(255,255,255,0.1); color:#ccc; margin-bottom: 15px;">浏览...</button>
            <br>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button id="scan-btn" class="setup-btn" style="width: 100%;">开始游戏</button>
            </div>
            <div id="scan-status" style="margin-top: 20px; color: #a1a1aa; font-size: 13px;"></div>
            <input type="hidden" id="folder-input">
        </div>
    </div>

    <div id="select-screen" class="screen">
        <div id="select-bg" class="select-bg"></div>
        <div id="settings-btn" class="top-btn">设置</div>
        
        <div class="search-bar-container" id="search-bar-container">
            <input type="text" id="search-input" class="search-input" placeholder="搜索标题、艺术家、难度..." oninput="renderMapList()">
            <select id="sort-field" class="search-select" onchange="renderMapList()">
                <option value="title">标题 (A-Z)</option>
                <option value="artist">艺术家 (A-Z)</option>
                <option value="stars">难度</option>
                <option value="bpm">BPM</option>
            </select>
            <select id="sort-dir" class="search-select" onchange="renderMapList()">
                <option value="asc">升序</option>
                <option value="desc">降序</option>
            </select>
        </div>

        <div class="select-left">
            <div class="map-stats" id="map-stats">
                <div class="stat-item">BPM <span id="stat-bpm">0</span></div>
                <div class="stat-item">OD <span id="stat-od">0</span></div>
                <div class="stat-item">HP <span id="stat-hp">0</span></div>
                <div class="stat-item">按键 <span id="stat-notes">0</span></div>
                <div class="stat-item">长按 <span id="stat-holds">0</span></div>
                <div class="stat-item">模式 <span id="stat-keys" style="color:#fbbf24;">4K</span></div>
            </div>

            <div class="info-container">
                <div style="color: #60a5fa; font-size: 14px; font-weight: 600; margin-bottom: 5px;" id="info-header">选择一首歌曲开始</div>
                <div id="info-title" class="info-title">等待中...</div>
                <div id="info-artist" class="info-artist">...</div>
                <div id="info-version" style="font-size: 20px; color: #fff; font-weight: 700; margin-bottom: 10px;"></div>
                <div id="info-stars" class="info-stars"></div>
                <div class="loading-indicator">正在加载谱面...</div>

                <div style="display: flex; gap: 20px; width: 100%; max-width: 650px; margin-top: 15px;">
                    <div id="local-leaderboard-panel" style="flex: 1; background: transparent; border: none; padding: 0; display: none; flex-direction: column; min-height: 0;">
                        <div class="leaderboard-title">本地分数</div>
                        <div id="local-leaderboard-list" style="flex: 1; overflow-y: auto; font-size: 14px; padding-right: 15px; max-height: 180px;">等待中...</div>
                    </div>
                    <div id="leaderboard-panel" style="flex: 1; background: transparent; border: none; padding: 0; display: none; flex-direction: column; min-height: 0;">
                        <div class="leaderboard-title">全球排行榜</div>
                        <div id="leaderboard-list" style="flex: 1; overflow-y: auto; font-size: 14px; padding-right: 15px; max-height: 180px;">等待中...</div>
                    </div>
                </div>
            </div>
            
            <button id="btn-random-map" class="setup-btn" style="position: absolute; bottom: 30px; left: 80px; z-index: 100; font-size: 14px; padding: 10px 20px; background: rgba(59,130,246,0.8); backdrop-filter: blur(5px);">[ 随机选歌 ]</button>
        </div>

        <div class="select-right" id="map-list"></div>
    </div>

    <div id="settings-modal">
        <div class="settings-content">
            <h2 style="color: #fff; margin-top: 0; margin-bottom: 25px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px;">设置</h2>
            
            <div class="setting-row">
                <label class="setting-label">osu! Songs 文件夹路径</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="set-folder" class="setting-input" style="flex: 1;">
                    <button id="set-folder-btn" class="setup-btn" style="padding: 10px; font-size: 13px; background: #4b5563;">浏览</button>
                </div>
            </div>

            <div class="setting-row">
                <label class="setting-label">玩家昵称</label>
                <input type="text" id="set-username" class="setting-input" placeholder="例如: Player#123">
            </div>

            <div class="setting-row" style="margin-top: 20px;">
                <label class="setting-label">音频偏移 (ms)</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="number" id="set-offset" class="setting-input" style="flex: 1;">
                    <button id="apply-offset-btn" class="setup-btn" style="padding: 10px; font-size: 13px; background: #10b981; display: none;">应用修复</button>
                </div>
            </div>

            <div class="setting-row"><label class="setting-label">下落速度</label><input type="number" id="set-speed" class="setting-input"></div>
            <div class="setting-row"><label class="setting-label">轨道缩放 (x)</label><input type="number" step="0.1" id="set-scale" class="setting-input"></div>
            <div class="setting-row"><label class="setting-label">背景模糊 (px)</label><input type="number" id="set-blur" class="setting-input"></div>
            <div class="setting-row"><label class="setting-label">背景暗化 (0-100)</label><input type="number" id="set-bg-dim" class="setting-input" min="0" max="100"></div>
            
            <div class="setting-row" style="margin-top: 25px;">
                <label class="setting-label">轨道颜色 (按顺序: 外侧, 内侧, 中心特键, 其他辅助)</label>
                <div class="color-picker-row">
                    <input type="color" id="lane-color-1" class="color-picker" value="#ffffff">
                    <input type="color" id="lane-color-2" class="color-picker" value="#34d399">
                    <input type="color" id="lane-color-3" class="color-picker" value="#fbbf24">
                    <input type="color" id="lane-color-4" class="color-picker" value="#ffffff">
                </div>
            </div>

            <div class="setting-row" style="margin-top: 25px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1);">
                <label class="setting-label" style="color: #60a5fa; font-size: 15px;">全键位定制 (1K - 18K) - 每条轨道最多绑定两个键</label>
                <select id="keybind-k-select" class="setting-input" style="width: 150px; margin-bottom: 15px; cursor: pointer;">
                    <option value="1">1K 模式</option>
                    <option value="2">2K 模式</option>
                    <option value="3">3K 模式</option>
                    <option value="4" selected>4K 模式</option>
                    <option value="5">5K 模式</option>
                    <option value="6">6K 模式</option>
                    <option value="7">7K 模式</option>
                    <option value="8">8K 模式</option>
                    <option value="9">9K 模式</option>
                    <option value="10">10K 模式</option>
                    <option value="11">11K 模式</option>
                    <option value="12">12K 模式</option>
                    <option value="13">13K 模式</option>
                    <option value="14">14K 模式</option>
                    <option value="15">15K 模式</option>
                    <option value="16">16K 模式</option>
                    <option value="17">17K 模式</option>
                    <option value="18">18K 模式</option>
                </select>
                <!-- 动态渲染的键位设置表格 -->
                <div id="keybind-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
            </div>

            <div class="setting-row" style="margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                <label class="setting-label">数据管理</label>
                <button id="settings-force-scan-btn" class="setup-btn" style="width: 100%; background: #f59e0b; padding: 10px; font-size: 14px;">重新扫描谱面</button>
                <div id="settings-scan-status" style="margin-top: 10px; font-size: 13px; text-align: center; font-weight: 600;"></div>
            </div>

            <button id="save-settings-btn" class="settings-close-btn">保存并关闭</button>
        </div>
    </div>

    <div id="context-menu">
        <div class="cm-item" id="cm-fav">收藏</div>
        <div class="cm-item" id="cm-rename">重命名文件夹</div>
        <div class="cm-item" id="cm-delete" style="color: #fca5a5;">删除谱面</div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
