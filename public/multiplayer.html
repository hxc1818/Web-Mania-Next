<!-- /public/multiplayer.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Mania Next - Multiplayer</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/multiplayer.css">
</head>
<body>

    <div class="mode-switcher">
        <a class="mode-tab" href="index.html">Single Player</a>
        <a class="mode-tab active" href="multiplayer.html">Multiplayer</a>
    </div>

    <div id="multi-login-screen" class="screen active">
        <div class="setup-box">
            <div class="setup-title">多人游戏登录</div>
            <div class="setup-desc">输入昵称加入大厅</div>
            <div id="login-error" style="color:#ef4444; margin-bottom: 10px; font-weight: bold; display: none;"></div>
            <input type="text" id="username-input" class="setup-input" placeholder="例如: RhythmMaster">
            <button class="setup-btn" style="width: 100%;" onclick="joinMultiLobby()">连接</button>
        </div>
    </div>

    <div id="multi-lobby-screen" class="screen">
        <div class="top-btn" style="right: 40px; background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid #3b82f6;" onclick="showCreateRoomModal()">创建房间</div>
        <div class="multi-layout">
            <div class="panel" style="flex: 1;">
                <h2>在线房间</h2>
                <div id="room-list" style="flex: 1; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <div id="multi-room-screen" class="screen">
        <div class="top-btn" style="left: 40px; background: rgba(239, 68, 68, 0.1); color: #ef4444;" onclick="leaveRoom()">退出房间</div>
        <div class="multi-layout">
            
            <div class="panel" style="flex: 1.2;">
                <h2>谱面队列</h2>
                <div id="map-queue-list" style="flex: 1; overflow-y: auto; margin-bottom: 15px;"></div>
                
                <div id="drop-zone" class="drop-zone" style="height: 50px; margin-bottom: 10px; border-radius: 8px; border: 2px dashed rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; color: #888; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s;">
                    将 .osz 文件拖至此处添加谱面
                </div>
                <div id="upload-status" style="text-align: center; color:#60a5fa; height: 16px; font-size: 12px;"></div>

                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <button class="setup-btn" style="flex: 1; background: rgba(255,255,255,0.1); color: #fff;" onclick="openMultiMapSelector()">添加本地谱面</button>
                </div>

                <div style="display: flex; gap: 15px; margin-top: auto;">
                    <button class="setup-btn" id="btn-spectate" style="flex: 1; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #ccc;">观战</button>
                    <button class="setup-btn" id="btn-action" style="flex: 2; background: #10b981;">准备</button>
                </div>
            </div>
            
            <div class="panel" style="flex: 1;">
                <h2>玩家列表</h2>
                <div id="player-list" style="flex: 1; overflow-y: auto;"></div>
            </div>

            <div class="panel" style="flex: 1.2; padding: 0;">
                <div style="padding: 20px 20px 0 20px;">
                    <h2>聊天</h2>
                </div>
                <div class="chat-container">
                    <div id="chat-messages" class="chat-messages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chat-input" class="chat-input" placeholder="输入消息..." onkeypress="if(event.key==='Enter') sendChat()">
                        <button class="chat-send-btn" onclick="sendChat()">发送</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 创建房间弹窗 -->
    <div id="create-room-overlay">
        <div class="modal-box">
            <div class="modal-title">创建房间</div>
            <input type="text" id="new-room-name" class="setup-input" placeholder="房间名称">
            <input type="password" id="new-room-pass" class="setup-input" placeholder="密码 (选填)">
            <input type="number" id="new-room-max" class="setup-input" placeholder="最大人数 (2-32)" min="2" max="32" value="8">
            <button class="setup-btn" style="background: rgba(255,255,255,0.1); color: #ddd;" onclick="openCreateRoomMapSelector()">选择首张谱面 (必选)</button>
            <div id="create-room-map-name" style="font-size: 13px; color: #34d399; text-align: center;">未选择</div>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="setup-btn" style="flex:1; background: #4b5563;" onclick="closeCreateRoomModal()">取消</button>
                <button class="setup-btn" style="flex:1;" onclick="createRoom()">确认创建</button>
            </div>
        </div>
    </div>

    <!-- 密码输入弹窗 -->
    <div id="password-overlay">
        <div class="modal-box">
            <div class="modal-title">加入加密房间</div>
            <input type="password" id="join-room-pass" class="setup-input" placeholder="请输入密码">
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="setup-btn" style="flex:1; background: #4b5563;" onclick="closePasswordModal()">取消</button>
                <button class="setup-btn" style="flex:1;" onclick="submitJoinPassword()">确定</button>
            </div>
        </div>
    </div>

    <div id="select-overlay">
        <div class="overlay-close" onclick="closeMapSelector()">× 取消</div>
        <iframe class="select-iframe" id="select-iframe"></iframe>
    </div>

    <div id="context-menu">
        <div class="cm-item" id="cm-kick" style="color: #fca5a5;">踢出玩家</div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/multiplayer.js"></script>
</body>
</html>
