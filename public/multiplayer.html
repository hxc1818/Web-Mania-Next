<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Mania Next - Multiplayer</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/multiplayer.css">
</head>
<body>

    <div class="mode-switcher">
        <a class="mode-tab" href="index.html">Single Player</a>
        <a class="mode-tab active" href="multiplayer.html">Multiplayer</a>
    </div>

    <div id="multi-login-screen" class="screen active">
        <div class="setup-box">
            <div class="setup-title">多人游戏登录</div>
            <div class="setup-desc">输入您的游戏昵称以进入多人大厅</div>
            <div id="login-error" style="color:#ef4444; margin-bottom: 15px; font-weight: bold; display: none; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 8px;"></div>
            <input type="text" id="username-input" class="setup-input" placeholder="例如: RhythmMaster">
            <button class="osu-btn" style="width: 100%; margin-top: 10px;" onclick="joinMultiLobby()">连接大厅</button>
        </div>
    </div>

    <div id="multi-lobby-screen" class="screen">
        <div class="osu-btn top-btn-pos" style="right: 40px; height: 42px; padding: 0 20px;" onclick="showCreateRoomModal()">+ 创建房间</div>
        <div class="multi-layout">
            <div class="panel" style="flex: 1;">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid rgba(255,255,255,0.05); padding-bottom: 15px; margin-bottom: 20px;">
                    <h2 style="border: none; padding: 0; margin: 0; font-size: 24px;">在线房间</h2>
                    <div style="font-size: 14px; color: #aaa;">选择一个房间加入战斗</div>
                </div>
                <div id="room-list" style="flex: 1; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <div id="multi-room-screen" class="screen">
        <div class="osu-btn danger top-btn-pos" style="left: 40px; height: 42px; padding: 0 20px;" onclick="leaveRoom()">退出房间</div>
        <div class="multi-layout">
            
            <div class="panel" style="flex: 1.2;">
                <h2>谱面队列</h2>
                <div id="map-queue-list" style="flex: 1; overflow-y: auto; margin-bottom: 20px;"></div>
                
                <div id="drop-zone" class="drop-zone">
                    将 .osz 文件拖至此处快速导入
                </div>
                <div id="upload-status" style="text-align: center; color:#60a5fa; height: 20px; font-size: 13px; font-weight: 600; margin-bottom: 10px;"></div>

                <div style="display: flex; gap: 12px; margin-bottom: 20px;">
                    <button class="osu-btn secondary" style="flex: 1;" onclick="openMultiMapSelector()">从本地库添加谱面</button>
                </div>

                <div style="display: flex; gap: 16px; margin-top: auto;">
                    <button class="osu-btn secondary" id="btn-spectate" style="flex: 1;">观战</button>
                    <button class="osu-btn success" id="btn-action" style="flex: 2; font-size: 18px; font-weight: 800;">准备</button>
                </div>
            </div>
            
            <div class="panel" style="flex: 1;">
                <h2>玩家列表</h2>
                <div id="player-list" style="flex: 1; overflow-y: auto; padding-right: 8px;"></div>
            </div>

            <div class="panel" style="flex: 1.2; padding: 0; background: rgba(26,26,36,0.85);">
                <div style="padding: 24px 24px 0 24px;">
                    <h2>聊天频道</h2>
                </div>
                <div class="chat-container">
                    <div id="chat-messages" class="chat-messages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chat-input" class="chat-input" placeholder="输入消息开始交流..." onkeypress="if(event.key==='Enter') sendChat()">
                        <button class="osu-btn" style="height: 48px;" onclick="sendChat()">发送</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 创建房间弹窗 -->
    <div id="create-room-overlay">
        <div class="modal-box">
            <div class="modal-title">创立新房间</div>
            <input type="text" id="new-room-name" class="setup-input" placeholder="房间名称 (必填)">
            <input type="password" id="new-room-pass" class="setup-input" placeholder="房间密码 (选填，留空则为公开)">
            <input type="number" id="new-room-max" class="setup-input" placeholder="最大人数限制 (2-32)" min="2" max="32" value="8">
            
            <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; border: 1px dashed rgba(255,255,255,0.2); text-align: center;">
                <div id="create-room-map-name" style="font-size: 14px; font-weight: bold; color: #34d399; margin-bottom: 10px;">尚未选择初始谱面</div>
                <button class="osu-btn secondary osu-btn-sm" onclick="openCreateRoomMapSelector()">浏览本地曲库</button>
            </div>

            <div style="display: flex; gap: 12px; margin-top: 15px;">
                <button class="osu-btn secondary" style="flex:1;" onclick="closeCreateRoomModal()">取消</button>
                <button class="osu-btn" style="flex:2;" onclick="createRoom()">确认创建</button>
            </div>
        </div>
    </div>

    <!-- 密码输入弹窗 -->
    <div id="password-overlay">
        <div class="modal-box" style="width: 400px;">
            <div class="modal-title">访问受限</div>
            <div style="text-align: center; color: #aaa; font-size: 14px; margin-bottom: 10px;">该房间已被房主加密，请输入通行密码。</div>
            <input type="password" id="join-room-pass" class="setup-input" placeholder="请输入密码..." style="text-align: center; font-size: 16px; letter-spacing: 2px;">
            <div style="display: flex; gap: 12px; margin-top: 10px;">
                <button class="osu-btn secondary" style="flex:1;" onclick="closePasswordModal()">取消</button>
                <button class="osu-btn success" style="flex:1;" onclick="submitJoinPassword()">验证并加入</button>
            </div>
        </div>
    </div>

    <div id="select-overlay">
        <div class="overlay-close" onclick="closeMapSelector()">关闭选择器</div>
        <iframe class="select-iframe" id="select-iframe"></iframe>
    </div>

    <div id="context-menu">
        <div class="cm-item" id="cm-kick" style="color: #fca5a5; font-weight: bold;">将玩家移出房间</div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/multiplayer.js"></script>
</body>
</html>
