<!-- /public/game.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Mania Next - Game</title>
    <script src="https://cdn.jsdelivr.net/gh/phoboslab/jsmpeg@master/jsmpeg.min.js"></script>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/game.css">
</head>
<body>

    <div id="game-screen" class="screen">
        <div id="game-bg"></div>
        <canvas id="bg-video-canvas"></canvas>

        <div id="replay-badge" style="position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(52, 211, 153, 0.2); border: 1px solid #34d399; color: #34d399; padding: 6px 20px; border-radius: 20px; font-weight: 700; z-index: 100; display: none; text-shadow: 0 0 10px rgba(52, 211, 153, 0.6); letter-spacing: 1px; backdrop-filter: blur(5px);">观战中</div>
        
        <div class="game-hud">
            <div id="hud-score" class="hud-score">0000000</div>
            <div class="hud-details">
                <div class="hud-item">ACC <span id="hud-acc">100.00%</span></div>
                <div class="hud-item">PP <span id="hud-pp">0</span></div>
                <div class="hud-item">UR <span id="hud-ur">0.00</span></div>
            </div>
            <div id="hud-combo" style="font-size: 30px; font-weight: 800; color: #fff; margin-top: 10px; display: none;">0x</div>
        </div>
        <div id="hud-rank" class="hud-rank"></div>

        <div id="multi-lb" class="multi-lb"></div>
        <canvas id="game-canvas" width="800" height="800"></canvas>
        <div id="song-progress-container"><div id="song-progress-bar"></div></div>
    </div>

    <!-- 已经移除了旧的 DOM overlay 进度条以提升性能 -->

    <div id="spectator-grid" class="screen"></div>

    <div id="pause-screen" class="screen">
        <div class="pause-title" id="pause-title">已暂停</div>
        <div id="pause-countdown-text">3</div>
        <div id="pause-buttons" style="display: flex; flex-direction: column; align-items: center; gap: 15px;">
            <button class="osu-btn" style="width: 250px; font-size: 18px;" onclick="resumeGame()">继续</button>
            <button class="osu-btn secondary" style="width: 250px; font-size: 18px;" onclick="retryGame()">重试</button>
            <button class="osu-btn danger" style="width: 250px; font-size: 18px;" onclick="quitGame()">退出</button>
        </div>
    </div>

    <div id="waiting-overlay">
        <h1 style="color: #60a5fa; font-size: 40px; font-weight: 800; text-shadow: 0 0 20px rgba(96, 165, 250, 0.5);">正在等待其他玩家...</h1>
        <div style="color: #aaa; font-size: 18px; margin-top: 10px;">请稍候，直到所有人完成当前谱面。</div>
    </div>

    <div id="result-screen" class="screen">
        <div id="res-bg-container"></div>
        <button id="back-to-select" class="osu-btn secondary top-btn-pos" style="left: 40px;">返回大厅</button>
        
        <div id="res-meta">
            <div id="res-meta-title">Title</div>
            <div id="res-meta-artist">Artist</div>
            <div id="res-meta-stars" style="color: #fbbf24;">4.00 ★</div>
        </div>

        <div class="result-title">评级</div>
        <div id="result-failed" style="font-size: 100px; color: #ef4444; font-weight: 800; display: none; margin-bottom: 20px; text-shadow: 0 0 30px rgba(239, 68, 68, 0.5);">失败</div>
        <div id="result-grade" class="result-grade">A</div>
        
        <div class="result-stats" id="result-stats-container">
            <div class="stat-col" style="flex: 1;">
                <div class="stat-item-wrap">
                    <div class="stat-row-inner"><span style="color: #ffffff;">MAX</span><span id="res-max">0</span></div>
                    <div class="stat-bar-bg"><div class="stat-bar-fill" id="bar-max" style="background: #ffffff; box-shadow: 0 0 10px rgba(255,255,255,0.5);"></div></div>
                </div>
                <div class="stat-item-wrap">
                    <div class="stat-row-inner"><span style="color: #fbbf24;">300</span><span id="res-300">0</span></div>
                    <div class="stat-bar-bg"><div class="stat-bar-fill" id="bar-300" style="background: #fbbf24; box-shadow: 0 0 10px rgba(251, 191, 36, 0.5);"></div></div>
                </div>
                <div class="stat-item-wrap">
                    <div class="stat-row-inner"><span style="color: #34d399;">200</span><span id="res-200">0</span></div>
                    <div class="stat-bar-bg"><div class="stat-bar-fill" id="bar-200" style="background: #34d399; box-shadow: 0 0 10px rgba(52, 211, 153, 0.5);"></div></div>
                </div>
                <div class="stat-item-wrap">
                    <div class="stat-row-inner"><span style="color: #60a5fa;">100</span><span id="res-100">0</span></div>
                    <div class="stat-bar-bg"><div class="stat-bar-fill" id="bar-100" style="background: #60a5fa; box-shadow: 0 0 10px rgba(96, 165, 250, 0.5);"></div></div>
                </div>
                <div class="stat-item-wrap">
                    <div class="stat-row-inner"><span style="color: #a78bfa;">50</span><span id="res-50">0</span></div>
                    <div class="stat-bar-bg"><div class="stat-bar-fill" id="bar-50" style="background: #a78bfa; box-shadow: 0 0 10px rgba(167, 139, 250, 0.5);"></div></div>
                </div>
                <div class="stat-item-wrap">
                    <div class="stat-row-inner"><span style="color: #ef4444;">MISS</span><span id="res-miss">0</span></div>
                    <div class="stat-bar-bg"><div class="stat-bar-fill" id="bar-miss" style="background: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);"></div></div>
                </div>
            </div>

            <div style="width: 2px; background: rgba(255,255,255,0.05);"></div>
            <div class="stat-col" style="justify-content: center;">
                <div style="color: #aaa; font-size: 14px;">ACC</div>
                <div id="res-acc" class="stat-acc" style="margin-bottom: 10px;">0.00%</div>
                <div class="stat-row" style="width: 250px; font-size: 16px;"><span style="color: #aaa;">分数</span><span id="res-score" style="color: #fff; font-weight: bold;">0</span></div>
                <div class="stat-row" style="width: 250px; font-size: 16px;"><span style="color: #aaa;">最大连击</span><span id="res-combo" style="color: #fff; font-weight: bold;">0x</span></div>
                <div class="stat-row" style="width: 250px; font-size: 16px;"><span style="color: #aaa;">PP</span><span id="res-pp" style="color: #60a5fa; font-weight: bold;">0</span></div>
            </div>
            <div style="width: 2px; background: rgba(255,255,255,0.05);"></div>
            <div class="stat-col" style="justify-content: center; align-items: center; width: 120px;">
                <div style="color: #aaa; font-size: 14px;">本地排名</div>
                <div id="res-rank" style="font-size: 48px; font-weight: 800; color: #fbbf24; margin-top: 10px;">-</div>
            </div>
        </div>

        <table class="multi-res-table" id="multi-res-table" style="display: none;">
            <thead><tr><th>排名</th><th>玩家</th><th>分数</th><th>ACC</th><th>COMBO</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="js/common.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
