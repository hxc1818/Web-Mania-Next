- name: Generate Classified Release Notes
  run: |
    # 设置时间范围（过去 24 小时）
    since_date=$(date -d "1 day ago" +%Y-%m-%dT%H:%M:%SZ)
    
    echo "### 🚀 每日更新摘要 (${{ github.run_number }})" > daily_changelog.md
    echo "" >> daily_changelog.md

    # 1. 处理 [重大更新]
    echo "#### 🌟 重大更新" >> daily_changelog.md
    git log --since="$since_date" --grep="\[重大更新\]" --pretty=format:"* %s (%h)" >> daily_changelog.md || echo "无" >> daily_changelog.md
    echo -e "\n" >> daily_changelog.md

    # 2. 处理 新增
    echo "#### ✨ 新功能" >> daily_changelog.md
    git log --since="$since_date" --grep="新增——" --pretty=format:"* %s (%h)" >> daily_changelog.md || echo "无" >> daily_changelog.md
    echo -e "\n" >> daily_changelog.md

    # 3. 处理 修复
    echo "#### 🐞 Bug 修复" >> daily_changelog.md
    git log --since="$since_date" --grep="修复——" --pretty=format:"* %s (%h)" >> daily_changelog.md || echo "无" >> daily_changelog.md
    echo -e "\n" >> daily_changelog.md

    # 4. 处理 优化 & 杂项
    echo "#### 🛠️ 优化与杂项" >> daily_changelog.md
    git log --since="$since_date" --grep="优化——" --pretty=format:"* %s (%h)" >> daily_changelog.md
    git log --since="$since_date" --grep="杂项——" --pretty=format:"* %s (%h)" >> daily_changelog.md
    
- name: Create Release
  uses: softprops/action-gh-release@v1
  with:
    body_path: daily_changelog.md
    tag_name: v0.1.${{ github.run_number }}-beta
    prerelease: true